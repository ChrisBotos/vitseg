###############################################################################
# environment.yml – conda environment for vitseg (Python 3.10)
#
# Create:
#     conda env create -f environment.yml
#
# Activate:
#     conda activate vitseg_310
#
# Update:
#     conda env update -f environment.yml --prune
#
# For GPU support, after creation run:
#     pip install torch==2.7.1+cu121 torchvision==0.22.1+cu121 \
#         --extra-index-url https://download.pytorch.org/whl/cu121
###############################################################################

name: vitseg_310

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # ---------- All packages via pip (numpy 2.x compatibility) ----------------
  - pip:
    # Core numerical stack.
    - numpy==2.2.6
    - scipy==1.14.1
    - pandas==2.2.3

    # CuPy (CUDA 12.x).
    - cupy-cuda12x==13.5.0
    - fastrlock>=0.5

    # Arrow / parquet I/O.
    - pyarrow==20.0.0
    - fastparquet==2024.2.0

    # Plotting & imaging.
    - matplotlib==3.10.3
    - contourpy==1.1.0
    - pillow==10.0.1
    - imageio==2.33.0
    - scikit-image==0.23.2
    - pywavelets==1.8.0
    - imagecodecs==2025.3.30
    - seaborn
    - tifffile

    # Machine-learning.
    - scikit-learn==1.7.0
    - joblib==1.5.1
    - tqdm==4.67.1

    # Deep-learning stack (CPU default; see header for GPU).
    - torch==2.7.1
    - torchvision==0.22.1

    # Single-cell & AnnData.
    - anndata==0.11.4
    - scanpy==1.11.2

    # HuggingFace transformers.
    - transformers==4.52.4

    # Rich console output.
    - rich

    # Dev / testing.
    - pytest==8.4.0
    - psutil==7.0.0
